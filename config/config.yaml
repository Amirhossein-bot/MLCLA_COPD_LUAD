# MLCLA-Net project configuration
# Update local paths before running the workflow.

project:
  name: "MLCLA-Net-COPD-LUAD"
  version: "1.0.0"
  description: "Multilayer transcriptomic framework for shared COPD-LUAD regulatory community discovery"
  random_seed: 42

paths:
  raw_data_dir: "data/raw"
  processed_data_dir: "data/processed"
  intermediate_dir: "results/intermediate"
  results_dir: "results"
  supplementary_dir: "supplementary"
  figures_dir: "results/figures"
  logs_dir: "logs"

datasets:
  copd:
    accession: "GSE38974"
    repository: "GEO"
    tissue: "lung tissue"
    mirna_platform: "GPL7723"
    mrna_platform: "GPL4133"
    phenotype_labels:
      case: "COPD"
      control: "control"

  luad:
    accession: "TCGA-LUAD"
    repository: "Genomic Data Commons"
    mirna_data_type: "miRNA-seq"
    mrna_data_type: "RNA-seq"
    clinical_data: "TCGA-LUAD clinical survival metadata"
    network_samples: "primary tumor"

  external_validation:
    luad:
      - accession: "GSE32863"
        comparison: "tumor_vs_normal"
      - accession: "GSE19804"
        comparison: "tumor_vs_normal"
    copd:
      - accession: "GSE57148"
        comparison: "COPD_vs_control"
      - accession: "GSE76925"
        comparison: "COPD_vs_control"

preprocessing:
  log_transform: true
  quantile_normalization_for_microarray: true
  collapse_multiple_probes_by: "mean"
  remove_low_expression_features: true
  remove_low_variance_features: true
  perform_pca_qc: true
  perform_hierarchical_clustering_qc: true

differential_expression:
  test: "Welch_t_test"
  multiple_testing_correction: "Benjamini-Hochberg"
  significance_fdr: 0.05
  log2fc_calculation: "case_mean_minus_control_mean"

network_reconstruction:
  correlation_method: "Spearman"

  copd_mirna_mrna_association:
    input: "matched COPD miRNA and mRNA expression matrices"
    network_type: "bipartite miRNA-gene association network"
    prioritize_negative_correlations_for_interpretation: true

  copd_gene_coexpression:
    input: "COPD mRNA-derived gene expression matrix"
    network_type: "gene co-expression network"
    abs_spearman_threshold: 0.6
    remove_self_correlations: true
    remove_duplicate_gene_pairs: true
    multiple_testing_correction: "Benjamini-Hochberg"

  luad_mirna_mrna_association:
    input: "matched TCGA-LUAD miRNA and mRNA expression matrices"
    network_type: "bipartite miRNA-gene association network"
    selected_mirnas: "top differentially expressed miRNAs ranked by FDR"
    selected_genes: "top differentially expressed mRNA-derived genes ranked by FDR"
    abs_spearman_threshold: 0.4
    fdr_threshold: 0.1
    prioritize_negative_correlations_for_interpretation: true

  luad_gene_coexpression:
    input: "TCGA-LUAD mRNA-derived gene expression matrix"
    network_type: "gene co-expression network"
    abs_spearman_threshold: 0.6
    remove_self_correlations: true
    remove_duplicate_gene_pairs: true

supra_network:
  layers:
    - "COPD_gene_coexpression"
    - "miRNA_associated_cross_regulatory"
    - "LUAD_gene_coexpression"
  node_layer_objects: 24150
  edges: 209503
  nodes_per_layer: 8050
  layer_prefixes:
    copd_gene: "COPD_gene"
    mirna_cross: "miRNA_cross"
    luad_gene: "LUAD_gene"
  shared_identifier_rule: "remove layer-specific prefix and compare base identifier"

community_retention:
  required_number_of_layers: 3
  minimum_shared_identifiers: 5

candidate_extraction:
  classify_identifiers_as:
    - "miRNA-like"
    - "mRNA/gene-like"
  use_mirna_like_identifiers_as_module_anchors: true
  use_mrna_gene_like_candidates_for:
    - "functional_enrichment"
    - "external_validation"
    - "survival_support_analysis"
  selection_priority:
    - "shared identifier status"
    - "retained community membership"
    - "total supra-network degree"

enrichment:
  tool: "GSEApy/Enrichr"
  libraries:
    - "GO_Biological_Process"
    - "GO_Molecular_Function"
    - "GO_Cellular_Component"
    - "KEGG"
    - "Reactome"
    - "WikiPathways"
    - "MSigDB_Hallmark"
    - "miRTarBase"
    - "TargetScan"
  correction: "Benjamini-Hochberg"
  primary_support_threshold: 0.05
  interpret_mirna_target_set_enrichment_as: "hypothesis-generating"

external_validation:
  focus: "mRNA/gene candidates"
  reason: "independent validation datasets contain mRNA expression profiles"
  statistical_test: "Welch_t_test"
  correction: "Benjamini-Hochberg"
  fdr_supported_threshold: 0.05
  nominal_threshold: 0.05
  directional_concordance: true
  module_level_test: "Fisher_exact_test"

survival:
  cohort: "TCGA-LUAD"
  endpoint: "overall_survival"
  stratification: "median_expression"
  model: "univariate_Cox_proportional_hazards"
  km_test: "log_rank"
  correction: "Benjamini-Hochberg"
  fdr_supported_threshold: 0.05
  interpretation: "exploratory unless FDR-supported"
  multivariate_cox: false
  multivariate_cox_reason: "age, sex, and tumor-stage covariates unavailable in final clinical file"

figures:
  figure_1: "MLCLA-Net workflow"
  figure_2: "COPD transcriptomic preprocessing and disease-specific network overview"
  figure_3: "LUAD transcriptomic preprocessing and disease-specific network overview"
  figure_4: "Three-layer retained MLCLA community visualization"
  figure_5: "MLCLA-Net convergence profile"
  figure_6: "Baseline community-detection comparison"
  figure_7: "External validation summary"
  figure_8: "Functional enrichment and pathway-support atlas"
